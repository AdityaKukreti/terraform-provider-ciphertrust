name: Terraform Issue Bot

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      stale_pr_minutes:
        description: 'Testing only: close PRs inactive for this many minutes. Leave empty to use days.'
        required: false
        default: ''
      stale_pr_days:
        description: 'Production threshold in days when stale_pr_minutes is empty.'
        required: false
        default: '30'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  terraform-bot:
    name: Run Terraform issue bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bot dependencies
        run: pip install -r terraform-bot/requirements.txt

      - name: Run bot
        env:
          GITHUB_TOKEN: ${{ secrets.CIPHERBOT_PAT }}
          GH_TOKEN: ${{ secrets.CIPHERBOT_PAT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant
          STALE_PR_MINUTES: ${{ github.event.inputs.stale_pr_minutes }}
          STALE_PR_DAYS: ${{ github.event.inputs.stale_pr_days || '30' }}
          STALE_PR_LABEL: stale
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python terraform-bot/bot.py
