name: Terraform Issue Bot

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review, labeled]
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Optional mode: default, dashboard, merge-queue, stale-prs.'
        required: false
        default: ''
      stale_pr_minutes:
        description: 'Testing only: close PRs inactive for this many minutes. Leave empty to use days.'
        required: false
        default: ''
      stale_pr_days:
        description: 'Production PR threshold in days when stale_pr_minutes is empty.'
        required: false
        default: '30'
      stale_issue_days:
        description: 'Production issue threshold in days.'
        required: false
        default: '60'

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  terraform-bot:
    name: Run Terraform issue bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bot dependencies
        run: pip install -r terraform-bot/requirements.txt

      - name: Run bot
        env:
          GITHUB_TOKEN: ${{ secrets.CIPHERBOT_PAT }}
          GH_TOKEN: ${{ secrets.CIPHERBOT_PAT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant
          TERRAFORM_BOT_MODE: ${{ github.event.inputs.mode }}
          STALE_PR_MINUTES: ${{ github.event.inputs.stale_pr_minutes }}
          STALE_PR_DAYS: ${{ github.event.inputs.stale_pr_days || '30' }}
          STALE_ISSUE_DAYS: ${{ github.event.inputs.stale_issue_days || '60' }}
          STALE_PR_LABEL: stale
          STALE_ISSUE_LABEL: stale
          BOT_AUTO_MERGE: 'false'
          BOT_AUTO_MERGE_LABEL: automerge
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python terraform-bot/bot.py
