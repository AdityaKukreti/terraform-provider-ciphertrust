name: Bot Tests

on:
  pull_request:
    branches: [main, '1.0.1']
    paths:
      - 'terraform-bot/**'
  push:
    branches: [main, '1.0.1']
    paths:
      - 'terraform-bot/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bot-tests:
    name: Run bot unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r terraform-bot/requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest terraform-bot/tests/ -v
