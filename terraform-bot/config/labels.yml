labels:
  bug:
    color: d73a4a
    description: Something is not working as expected.
    keywords:
      - bug
      - broken
      - error
      - exception
      - panic
      - crash
      - fails
      - failure
      - regression
      - unexpected
      - invalid
      - unable
      - cannot
      - issue

  enhancement:
    color: a2eeef
    description: New feature or improvement request.
    keywords:
      - feature
      - enhancement
      - improve
      - improvement
      - support
      - add
      - request
      - should
      - would like

  documentation:
    color: 0075ca
    description: Documentation, examples, or README changes.
    keywords:
      - docs
      -