bot:
  dashboard_issue_title: "CipherTrust Bot Dashboard"
  idempotent_comments: true

labels:
  managed_extra: []

owners:
  fallback:
    provider/**: []
    internal/**: []
    examples/**: []
    docs/**: []
    "*.md": []

risk:
  high_risk_paths:
    - .github/workflows/**
    - terraform-bot/**
    - go.mod
    - go.sum
    - "**/*auth*"
    - "**/*credential*"
    - "**/*token*"
    - "**/*secret*"
    - "**/*tls*"
  low_risk_paths:
    - docs/**
    - examples/**
    - "*.md"
    - "**/*.md"

auto_merge:
  enabled: false
  label: automerge
  method: squash
  trusted_author_associations:
    - OWNER
    - MEMBER
    - COLLABORATOR

merge_queue:
  enabled: true
  label: merge-queue
  ready_label: automerge

commands:
  natural_language: true
  min_intent_confidence: 0.75
